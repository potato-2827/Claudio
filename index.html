<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mis Tareas</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mis Tareas">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%236366f1'/%3E%3Cpath d='M28 52l14 14 30-32' fill='none' stroke='white' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root{
    color-scheme:light;
    --menu:#ffffff;
    --bg1:#eef2ff; --bg2:#faf5ff;
    --card:rgba(255,255,255,.82);
    --card-border:rgba(255,255,255,.7);
    --text:#181527; --muted:#5f5d70;
    --accent:#5457e6; --accent-soft:#e7e9ff;
    --done:#9a98ab; --danger:#dc2626;
    --shadow:0 20px 50px -20px rgba(60,50,120,.45);
    --input-bg:rgba(255,255,255,.7);
    --row-bg:rgba(255,255,255,.65);
    --row-border:rgba(120,110,160,.18);
  }
  [data-theme="dark"]{
    color-scheme:dark;
    --menu:#262238;
    --bg1:#14121d; --bg2:#1b1730;
    --card:rgba(34,30,50,.94);
    --card-border:rgba(255,255,255,.13);
    --text:#f5f3fc; --muted:#bfbbd2;
    --accent:#a6a4ff; --accent-soft:#322e52;
    --done:#928fab; --danger:#ff6b6b;
    --shadow:0 20px 50px -18px rgba(0,0,0,.7);
    --input-bg:rgba(255,255,255,.08);
    --row-bg:rgba(255,255,255,.06);
    --row-border:rgba(255,255,255,.13);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  .icon{display:block;flex:none}
  .btn-ico{display:inline-flex;vertical-align:-3px;margin-right:2px}
  .theme-btn .icon,.list-selector .icon{width:19px;height:19px}
  .filter-btn .btn-ico .icon,.toggle .btn-ico .icon{width:14px;height:14px}
  .search-ico .icon,.search-clear .icon{width:15px;height:15px}
  .mc-head button .icon{width:15px;height:15px}
  .ls-caret .icon{width:13px;height:13px}
  html,body{height:100%}
  html,body{scrollbar-width:none;-ms-overflow-style:none}
  html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0;display:none}
  body{
    font-family:"Segoe UI Variable Text","Segoe UI Variable","Segoe UI",system-ui,sans-serif;
    background:linear-gradient(155deg,var(--bg1),var(--bg2));
    color:var(--text);
    margin:0;padding:0;min-height:100vh;
    transition:background .4s ease;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    font-synthesis:none;
    letter-spacing:.005em;
  }
  .app{
    position:relative;
    width:100%;max-width:none;
    min-height:100vh;
    background:transparent;
    border:none;border-radius:0;
    padding:0;
    display:flex;flex-direction:column;
  }
  .sidebar{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:12px;
    padding:20px 20px 14px;flex:none}
  .main-content{display:flex;flex-direction:column;flex:1;min-height:0;padding:0 20px 14px}
  .titles{order:1;position:relative}
  .list-selector{display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    border:none;background:transparent;padding:0;border-radius:8px;color:var(--text);max-width:100%}
  .list-selector h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ls-caret{color:var(--muted);font-size:.9rem;flex:none;transition:transform .2s}
  .list-selector:hover .ls-caret{color:var(--accent)}
  .titles .date{color:var(--muted);font-size:.82rem;margin-top:2px}
  .ls-pop{position:absolute;top:calc(100% + 6px);left:0;right:auto;min-width:210px;max-width:280px;z-index:40}
  .ls-row{display:flex;align-items:center;gap:2px;border-radius:9px}
  .ls-row.active{background:var(--accent-soft)}
  .ls-name{flex:1;display:flex;align-items:center;gap:7px;min-width:0;
    border:none;background:transparent;cursor:pointer;font:inherit;font-size:.88rem;font-weight:600;
    color:var(--text);text-align:left;padding:8px 10px;border-radius:9px}
  .ls-name:hover{background:var(--accent-soft)}
  .ls-name span:last-child{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ls-check{width:14px;flex:none;color:var(--accent);font-weight:800}
  .ls-edit,.ls-del{border:none;background:transparent;cursor:pointer;color:var(--muted);
    width:26px;height:30px;border-radius:8px;flex:none;font-size:.85rem;
    display:grid;place-items:center;transition:.15s}
  .ls-edit:hover{background:var(--accent-soft);color:var(--accent)}
  .ls-del:hover{background:rgba(239,68,68,.12);color:var(--danger)}
  .ls-rename{width:100%;border:1px solid var(--accent);background:var(--input-bg);color:var(--text);
    border-radius:9px;padding:7px 10px;font:inherit;font-size:.88rem;font-weight:600;
    outline:none;box-shadow:0 0 0 3px var(--accent-soft);margin:1px 0}
  .ls-add{border:none;background:transparent;color:var(--accent);cursor:pointer;
    font:inherit;font-size:.82rem;font-weight:700;text-align:left;padding:8px 10px;border-radius:9px;
    margin-top:2px;border-top:1px solid var(--row-border)}
  .ls-add:hover{background:var(--accent-soft)}
  .mc-listtag{font-size:.66rem;color:var(--muted);background:var(--accent-soft);
    padding:1px 5px;border-radius:6px;white-space:nowrap}
  .theme-btn{
    border:none;cursor:pointer;width:38px;height:38px;border-radius:12px;
    background:var(--accent-soft);color:var(--accent);font-size:1.05rem;
    display:grid;place-items:center;transition:transform .2s,background .3s;flex:none;
  }
  .theme-btn:hover{transform:scale(1.08) rotate(-8deg)}
  .theme-btn.on{background:var(--accent);color:#fff}
  .head-actions{display:flex;gap:8px;flex:none;order:4}
  .sb-controls{order:2;flex:1 1 100%}

  .mini-cal{
    order:3;flex:1 1 300px;max-width:300px;margin:6px auto 0;
    border:1px solid var(--row-border);border-radius:14px;background:var(--card);
    padding:9px 11px 11px;
  }
  .mc-head{display:flex;align-items:center;gap:2px;margin-bottom:6px}
  .mc-head button{
    border:none;background:transparent;color:var(--muted);cursor:pointer;
    width:24px;height:24px;border-radius:8px;font-size:1rem;line-height:1;
    display:grid;place-items:center;transition:.15s;flex:none;
  }
  .mc-head button:hover{background:var(--accent-soft);color:var(--accent)}
  #mcLabel{flex:1;text-align:center;font-size:.8rem;font-weight:700}
  .mini-cal.collapsed .mc-grid{display:none}
  .mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .mc-foot{display:flex;justify-content:flex-end;margin-top:4px}
  .mc-foot button{
    border:none;background:transparent;color:var(--accent);cursor:pointer;
    font:inherit;font-size:.7rem;font-weight:700;padding:3px 7px;border-radius:7px;
    transition:.15s;
  }
  .mc-foot button:hover{background:var(--accent-soft)}
  .mc-dow{text-align:center;font-size:.6rem;font-weight:700;color:var(--muted);padding:2px 0 4px}
  .mc-cell{
    position:relative;aspect-ratio:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;border-radius:8px;
    font-size:.72rem;color:var(--text);gap:2px;
  }
  .mc-cell.mc-empty{visibility:hidden}
  .mc-cell.hovwrap{cursor:pointer}
  .mc-cell.hovwrap:hover{background:var(--accent-soft)}
  .mc-num{line-height:1}
  .mc-cell.mc-today .mc-num{
    color:#fff;background:var(--accent);border-radius:50%;
    width:18px;height:18px;display:grid;place-items:center;font-weight:700;
  }
  .mc-dot{width:5px;height:5px;border-radius:50%;flex:none}
  .mc-dot.due-overdue,.mc-dot.due-red{background:#ef4444}
  .mc-dot.due-orange{background:#f59e0b}
  .mc-dot.due-yellow{background:#84cc16}
  .mc-dot.due-green{background:#22c55e}

  /* Selector de fecha propio (reemplaza el calendario nativo) */
  .date-pop{position:fixed;padding:10px 12px 12px;width:216px}
  .date-pop .mc-grid{margin-bottom:8px}
  .date-pop .mc-cell{cursor:pointer}
  .date-pop .mc-cell:not(.mc-empty):not(.mc-disabled):hover{background:var(--accent-soft)}
  .date-pop .mc-cell.mc-selected .mc-num{
    border:2px solid var(--accent);border-radius:50%;
    width:18px;height:18px;display:grid;place-items:center;
  }
  .date-pop .mc-cell.mc-disabled{opacity:.3;cursor:default}
  .dp-foot{display:flex;gap:6px}
  .dp-foot button{flex:1;border:1px solid var(--row-border);background:transparent;color:var(--text);
    cursor:pointer;font:inherit;font-size:.78rem;font-weight:700;padding:7px 8px;border-radius:8px;transition:.15s}
  .dp-foot button:hover{background:var(--accent-soft);border-color:var(--accent)}
  .mc-grid .hovlist{left:50%;transform:translateX(-50%);top:calc(100% + 4px)}
  .mc-grid .hovlist.mc-right{left:auto;right:-8px;transform:none}
  .mc-grid .hovlist.mc-left{left:-8px;transform:none}

  .popover{
    position:absolute;top:62px;right:24px;z-index:30;min-width:218px;
    background:var(--menu);border:1px solid var(--row-border);
    border-radius:14px;box-shadow:var(--shadow);padding:8px;
    display:flex;flex-direction:column;gap:3px;
    animation:pop .18s ease;
  }
  .popover[hidden]{display:none}
  .popover button{
    border:none;background:transparent;color:var(--text);text-align:left;
    padding:9px 11px;border-radius:9px;cursor:pointer;font:inherit;font-size:.85rem;font-weight:600;
    transition:background .15s;
  }
  .popover button:hover{background:var(--accent-soft)}
  .sort-opt.active{background:var(--accent);color:#fff}
  .sort-opt.active:hover{background:var(--accent)}
  .ctxmenu{position:fixed;top:0;left:0;right:auto;z-index:50;min-width:190px}

  .progress-wrap{margin:14px 0 4px}
  .progress-meta{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:7px}
  .progress-meta b{color:var(--accent)}
  .bar{height:8px;border-radius:99px;background:var(--accent-soft);overflow:hidden}
  .bar>span{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--accent),#a78bfa);
    transition:width .5s cubic-bezier(.4,0,.2,1)}

  form{display:flex;gap:9px;margin:14px 0 12px}
  input[type=text]{
    flex:1;border:1px solid var(--row-border);background:var(--input-bg);
    color:var(--text);padding:12px 15px;border-radius:14px;font-size:.95rem;
    outline:none;transition:border .2s,box-shadow .2s;
  }
  input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  input::placeholder{color:var(--muted)}
  .add{
    border:none;cursor:pointer;background:var(--accent);color:#fff;
    width:46px;border-radius:14px;font-size:1.4rem;font-weight:300;line-height:1;
    transition:transform .15s,filter .2s;flex:none;
  }
  .add:hover{filter:brightness(1.08)}
  .add:active{transform:scale(.92)}

  .filters{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
  .filters button{
    border:none;cursor:pointer;background:transparent;color:var(--muted);
    padding:6px 10px;border-radius:8px;font-size:.82rem;font-weight:600;
    text-align:left;width:100%;transition:.2s;
  }
  .filters button.active{background:var(--accent);color:#fff}
  .filters button:not(.active):hover{background:var(--accent-soft);color:var(--accent)}

  ul{list-style:none;overflow-y:visible;flex:none;margin:0 -6px;padding:0 6px;
    scrollbar-width:none;-ms-overflow-style:none}
  ul::-webkit-scrollbar{width:0;height:0;display:none}
  li{
    display:flex;flex-direction:column;
    background:var(--row-bg);border:1px solid var(--row-border);
    border-radius:14px;margin-bottom:9px;
    animation:pop .28s cubic-bezier(.34,1.56,.64,1);
  }
  .row{display:flex;align-items:center;gap:9px;padding:12px 13px;min-height:54px}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
  li.removing{animation:out .25s forwards}
  @keyframes out{to{opacity:0;transform:translateX(40px);height:0;margin:0;padding-top:0;padding-bottom:0}}
  li.dragging{opacity:.45}

  .undo-toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:var(--menu);color:var(--text);border:1px solid var(--row-border);
    border-radius:12px;box-shadow:var(--shadow);
    padding:10px 10px 10px 16px;display:flex;align-items:center;gap:14px;
    font-size:.88rem;font-weight:600;z-index:60;max-width:90vw;
    animation:pop .2s ease;
  }
  .undo-toast[hidden]{display:none}
  .undo-toast span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .undo-toast button{
    border:none;background:var(--accent);color:#fff;font:inherit;font-weight:700;
    padding:7px 14px;border-radius:8px;cursor:pointer;transition:.2s;flex:none;
  }
  .undo-toast button:hover{filter:brightness(1.1)}
  li.drop-before{box-shadow:inset 0 3px 0 -1px var(--accent)}
  li.drop-after{box-shadow:inset 0 -3px 0 -1px var(--accent)}
  .grip{
    flex:none;cursor:grab;color:var(--muted);opacity:0;
    font-size:1rem;line-height:1;padding:0 1px;user-select:none;
    transition:opacity .2s,color .2s;touch-action:none;
  }
  li:hover .grip{opacity:.55}
  .grip:hover{color:var(--accent);opacity:1}
  .grip:active{cursor:grabbing}
  .check{
    width:24px;height:24px;flex:none;border-radius:50%;cursor:pointer;
    border:2.2px solid var(--accent);background:var(--accent-soft);position:relative;transition:.2s;
  }
  .check:hover{box-shadow:0 0 0 4px var(--accent-soft);transform:scale(1.08)}
  .check svg{position:absolute;inset:0;margin:auto;width:13px;height:13px;
    stroke:var(--accent);stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round;
    opacity:.45;transition:opacity .2s,stroke .2s}
  .check:hover svg{opacity:.75}
  li.done .check{background:var(--accent)}
  li.done .check svg{stroke:#fff;opacity:1}
  .body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .txt{min-width:0;max-width:100%;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.25s;cursor:text}
  .meta{display:flex;flex-wrap:wrap;align-items:center;gap:6px;min-height:20px}
  li.done .txt{color:var(--done);text-decoration:line-through}
  .edit-input{
    flex:1;font:inherit;font-size:.95rem;color:var(--text);
    background:var(--input-bg);border:1px solid var(--accent);
    border-radius:9px;padding:6px 9px;outline:none;
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  .edit,.del{
    border:none;background:transparent;cursor:pointer;color:var(--muted);
    display:grid;width:30px;height:30px;border-radius:9px;flex:none;font-size:1rem;
    place-items:center;transition:.2s;
  }
  .edit:hover{background:var(--accent-soft);color:var(--accent)}
  .del:hover{background:rgba(239,68,68,.12);color:var(--danger)}

  /* Subtareas */
  .subbtn{
    flex:none;border:none;cursor:pointer;border-radius:99px;white-space:nowrap;
    font:inherit;font-size:.7rem;font-weight:700;padding:3px 8px;
    background:var(--row-border);color:var(--muted);display:none;transition:background .2s;
    align-items:center;gap:4px;
  }
  li:hover .subbtn,.subbtn.has-sub,.subbtn.open{display:inline-flex}
  .subbtn:hover{background:var(--accent-soft);color:var(--accent)}
  .subbtn.complete{color:#16a34a}
  .subbtn.open{background:var(--accent-soft);color:var(--accent)}
  .chev{display:block;flex:none;transform-origin:50% 50%}
  .subbtn.open .chev{transform:rotate(90deg)}
  .chev.anim{animation:chevToClosed .35s cubic-bezier(.4,0,.2,1) forwards}
  .subbtn.open .chev.anim{animation:chevToOpen .35s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes chevToOpen{from{transform:rotate(0deg)}to{transform:rotate(90deg)}}
  @keyframes chevToClosed{from{transform:rotate(90deg)}to{transform:rotate(0deg)}}

  .hovwrap{position:relative;display:inline-flex}
  .hovlist{
    position:absolute;top:calc(100% + 6px);left:0;z-index:25;
    width:max-content;min-width:170px;max-width:min(90vw,460px);max-height:220px;overflow-y:auto;
    background:var(--menu);border:1px solid var(--row-border);
    border-radius:12px;box-shadow:var(--shadow);padding:7px;
    display:none;flex-direction:column;gap:4px;
  }
  .hovwrap:hover .hovlist{display:flex}
  .hovrow{display:flex;align-items:flex-start;gap:6px;font-size:.78rem;
    padding:3px 5px;border-radius:7px;white-space:normal;
    word-break:break-word;overflow-wrap:anywhere;color:var(--text)}
  .hovrow.done{color:var(--done);text-decoration:line-through}
  .hovempty{font-size:.78rem;color:var(--muted);padding:3px 5px}
  [data-theme="dark"] .subbtn.complete{color:#5fe08a}
  .subpanel{
    display:flex;flex-direction:column;gap:5px;
    padding:2px 14px 12px 46px;
    animation:pop .2s ease;
  }
  .subhead{display:flex;align-items:center;gap:9px;margin-bottom:3px;padding-right:2px}
  .subbar{flex:1;height:5px;border-radius:99px;background:var(--accent-soft);overflow:hidden}
  .subbar>span{display:block;height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--accent),#a78bfa);
    transition:width .4s cubic-bezier(.4,0,.2,1)}
  .subcount{font-size:.72rem;font-weight:700;color:var(--muted);white-space:nowrap}
  .subhead.complete .subcount{color:#16a34a}
  [data-theme="dark"] .subhead.complete .subcount{color:#5fe08a}
  .subhead.complete .subbar>span{background:linear-gradient(90deg,#16a34a,#4ade80)}
  .subitem{display:flex;align-items:center;gap:9px}
  .subcheck{
    width:18px;height:18px;flex:none;border-radius:50%;cursor:pointer;
    border:2px solid var(--accent);position:relative;transition:.2s;
  }
  .subcheck:hover{box-shadow:0 0 0 3px var(--accent-soft)}
  .subcheck svg{position:absolute;inset:0;margin:auto;width:10px;height:10px;
    stroke:#fff;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:20;stroke-dashoffset:20;transition:stroke-dashoffset .25s}
  .subitem.done .subcheck{background:var(--accent)}
  .subitem.done .subcheck svg{stroke-dashoffset:0}
  .subtxt{flex:1;font-size:.86rem;cursor:pointer;word-break:break-word}
  .subitem.done .subtxt{color:var(--done);text-decoration:line-through}
  .subedit{flex:1;font:inherit;font-size:.86rem;color:var(--text);
    background:var(--input-bg);border:1px solid var(--accent);border-radius:8px;
    padding:4px 8px;outline:none;box-shadow:0 0 0 3px var(--accent-soft)}
  .subdel,.subeditbtn{border:none;background:transparent;cursor:pointer;color:var(--muted);
    width:24px;height:24px;border-radius:7px;flex:none;font-size:.85rem;
    display:grid;place-items:center;transition:.2s}
  .subdel:hover{background:rgba(239,68,68,.12);color:var(--danger)}
  .subeditbtn:hover{background:var(--accent-soft);color:var(--accent)}
  .subadd-row{display:flex;align-items:center;gap:9px;padding-left:1px}
  .subadd{
    flex:1;font:inherit;font-size:.84rem;color:var(--text);
    background:var(--input-bg);border:1px solid var(--row-border);
    border-radius:8px;padding:6px 10px;outline:none;transition:.2s;
  }
  .subadd:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .attsec{border-top:1px dashed var(--row-border);padding-top:8px;margin-top:3px;
    display:flex;flex-direction:column;gap:6px}
  .atthead{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .attlbl{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.02em}
  .attadd{border:1px dashed var(--row-border);background:transparent;color:var(--accent);
    font-size:.78rem;font-weight:600;border-radius:8px;padding:4px 10px;cursor:pointer;transition:.2s}
  .attadd:hover{background:var(--accent-soft);border-color:var(--accent)}
  .attadd:disabled{opacity:.6;cursor:default}
  .attitem{display:flex;align-items:center;gap:8px}
  .attopen{flex:1;display:flex;align-items:center;gap:8px;min-width:0;
    cursor:pointer;border:none;background:transparent;font:inherit;color:var(--text);
    padding:5px 8px;border-radius:8px;text-align:left}
  .attopen:hover{background:var(--accent-soft)}
  .atticon{font-size:1rem;flex:none}

      await sb.auth.signOut();
      ["mis_tareas_v1","mis_tareas_cats","mis_tareas_sort","mis_tareas_prioFirst","mis_tareas_dueFirst","mis_tareas_web","mis_tareas_theme","mis_tareas_lists"].forEach(k=>localStorage.removeItem(k));
      location.reload();
    };

    sb.auth.getSession().then(({ data:{ session } })=>{
      sbUser = session ? session.user : null;
      if(session) ikStartApp(); else ikShowLogin();
    });
    sb.auth.onAuthStateChange((event, session)=>{
      sbUser = session ? session.user : null;
      if(session) ikStartApp(); else ikShowLogin();
    });

    document.getElementById("loginGithub").onclick = ()=>
      sb.auth.signInWithOAuth({ provider:"github", options:{ redirectTo: window.location.origin } });
    document.getElementById("loginGoogle").onclick = ()=>
      sb.auth.signInWithOAuth({ provider:"google", options:{ redirectTo: window.location.origin } });
    document.getElementById("logoutBtn").onclick = ()=> { if(confirm("¿Cerrar sesión?")) window.ikLogout(); };
  </script>

<script>
  // Versión web: persistencia en localStorage del navegador (reemplaza el IPC de Electron).
  if(!window.api){
    window.api = {
      load: async () => { try { return JSON.parse(localStorage.getItem("mis_tareas_web") || "{}"); } catch(e){ return {}; } },
      save: async (data) => { try { localStorage.setItem("mis_tareas_web", JSON.stringify(data)); } catch(e){} return true; }
    };
  }
  const KEY="mis_tareas_v1", THEMEKEY="mis_tareas_theme", CATKEY="mis_tareas_cats", SORTKEY="mis_tareas_sort";
  const LKEY="mis_tareas_lists";  // cache local del modelo v3: { lists, activeList }

  // ----- Modelo de listas -----
  // Cada lista tiene sus PROPIAS tareas, categorías y prefs de orden.
  // Las "globales de trabajo" (tasks/cats/sortMode/prioFirst/dueFirst) son
  // siempre las de la lista activa; el resto del código las usa como antes.
  let lists = [];
  let activeList = null;
  let tasks = [], cats = [], sortMode = "manual", prioFirst = false, dueFirst = false;

  function newListId(){ return "l"+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
  function activeListObj(){ return lists.find(l=>l.id===activeList) || lists[0] || null; }
  function pushGlobalsToActive(){   // globales -> lista activa (antes de guardar/leer todas)
    const l=activeListObj(); if(!l) return;
    l.tasks=tasks; l.cats=cats; l.sort=sortMode; l.prioFirst=prioFirst; l.dueFirst=dueFirst;
  }
  function pullGlobalsFromActive(){ // lista activa -> globales (al cambiar de lista)
    const l=activeListObj(); if(!l) return;
    activeList=l.id;
    tasks=Array.isArray(l.tasks)?l.tasks:[]; cats=Array.isArray(l.cats)?l.cats:[];
    sortMode=l.sort||"manual"; prioFirst=!!l.prioFirst; dueFirst=!!l.dueFirst;
  }
  function migrateFlat(d){  // formato viejo (una sola lista suelta) -> array de 1 lista
    return [{ id:newListId(), name:"Mis Tareas",
              tasks:Array.isArray(d.tasks)?d.tasks:[], cats:Array.isArray(d.cats)?d.cats:[],
              sort:d.sort||"manual", prioFirst:!!d.prioFirst, dueFirst:!!d.dueFirst }];
  }

  // Carga inicial desde localStorage (cache; en boot() manda lo de Supabase).
  (function initLocal(){
    try{
      const raw=localStorage.getItem(LKEY);
      if(raw){ const s=JSON.parse(raw); if(s && Array.isArray(s.lists) && s.lists.length){ lists=s.lists; activeList=s.activeList; } }
    }catch(e){}
    if(!lists.length){
      const d={};
      try{ d.tasks=JSON.parse(localStorage.getItem(KEY)||"[]"); }catch(e){ d.tasks=[]; }
      try{ d.cats=JSON.parse(localStorage.getItem(CATKEY)||"[]"); }catch(e){ d.cats=[]; }
      d.sort=localStorage.getItem(SORTKEY)||"manual";
      d.prioFirst=localStorage.getItem("mis_tareas_prioFirst")==="1";
      d.dueFirst=localStorage.getItem("mis_tareas_dueFirst")==="1";
      lists=migrateFlat(d); activeList=lists[0].id;
    }
    pullGlobalsFromActive();
  })();

  let statusFilter = "all";   // all | active | done
  let catFilter = "all";      // all | <id de categoria>
  // sortMode / prioFirst / dueFirst se declaran arriba (son de la lista activa)
  let emailNotif = localStorage.getItem("mis_tareas_emailNotif")==="1"; // recibir resumen diario por email (lo lee la función del servidor)
  let addingCat = false;
  let editingCat = null;  // id de la categoria en edicion (nombre/color), o null
  let searchQuery = "";         // texto del buscador (en minúsculas)
  let reminderDismissed = false; // banner de vencimientos descartado en esta sesión
  const expanded = new Set();   // ids de tareas con subtareas desplegadas
  const attExpanded = new Set(); // ids de tareas con el panel de archivos desplegado
  let lastToggleKey = null;      // que boton (sub/att de que tarea) se acaba de tocar, para animar solo ese
  let calMonth = (()=>{ const d=new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); })();  // mini calendario: 1er día del mes mostrado
  const notesExpanded = new Set();    // ids de tareas con el panel de notas desplegado
  const subNotesExpanded = new Set(); // ids de subtareas con sus notas desplegadas

  const PALETTE=["#6366f1","#ec4899","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ef4444","#14b8a6","#f97316","#0ea5e9"];

  // ----- Set de íconos (líneas finas, sin emoji) -----
  function svgIcon(inner, size){
    return `<svg class="icon" width="${size||16}" height="${size||16}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
  }
  const ICONS = {
    bell: s=>svgIcon('<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>', s),
    moon: s=>svgIcon('<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>', s),
    sun: s=>svgIcon('<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>', s),
    logout: s=>svgIcon('<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>', s),
    search: s=>svgIcon('<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>', s),
    eye: s=>svgIcon('<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>', s),
    tag: s=>svgIcon('<path d="M20.59 13.41 13.42 20.6a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.4" fill="currentColor" stroke="none"/>', s),
    sort: s=>svgIcon('<path d="M8 3v14M8 17l-4-4M8 17l4-4M16 21V7M16 7l4 4M16 7l-4 4"/>', s),
    chevLeft: s=>svgIcon('<polyline points="15 18 9 12 15 6"/>', s),
    chevRight: s=>svgIcon('<polyline points="9 18 15 12 9 6"/>', s),
    chevDown: s=>svgIcon('<polyline points="6 9 12 15 18 9"/>', s),
    star: s=>svgIcon('<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>', s),
    starFill: s=>svgIcon('<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="currentColor"/>', s),
    edit: s=>svgIcon('<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>', s),
    close: s=>svgIcon('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', s),
    paperclip: s=>svgIcon('<path d="M21.44 11.05 12.25 20.24a5.5 5.5 0 0 1-7.78-7.78l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95L9.41 17.41a1.5 1.5 0 0 1-2.12-2.12l8.49-8.49"/>', s),
    notes: s=>svgIcon('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/>', s),
    calendar: s=>svgIcon('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', s),
    check: s=>svgIcon('<polyline points="20 6 9 17 4 12"/>', s),
    grip: s=>svgIcon('<circle cx="9" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="9" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="9" cy="18" r="1.3" fill="currentColor" stroke="none"/><circle cx="15" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="15" cy="18" r="1.3" fill="currentColor" stroke="none"/>', s),
    clock: s=>svgIcon('<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/>', s),
    file: s=>svgIcon('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>', s),
    image: s=>svgIcon('<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>', s),
    checkCircle: s=>svgIcon('<circle cx="12" cy="12" r="9"/><polyline points="8 12 11 15 16 9"/>', s),
    clipboard: s=>svgIcon('<rect x="8" y="2" width="8" height="4" rx="1"/><path d="M9 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3"/>', s),
    plus: s=>svgIcon('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>', s),
  };
  function applyStaticIcons(root){
    (root||document).querySelectorAll("[data-icon]").forEach(el=>{
      const fn = ICONS[el.dataset.icon]; if(!fn) return;
      el.innerHTML = fn(el.dataset.iconSize);
    });
  }

  // ----- Adjuntos (Supabase Storage) -----
  const ATT_BUCKET="adjuntos";
  const ATT_ALLOWED_EXT=["pdf","doc","docx","ppt","pptx","png","jpg","jpeg","gif","webp"];
  let attTargetTaskId=null;

  const $ = s => document.querySelector(s);
  const list=$("#list"), input=$("#input"), catBar=$("#catBar");
  const catById = id => cats.find(c=>c.id===id);

  // Fecha en español
  (function(){
    const s = new Date().toLocaleDateString("es-ES", {weekday:"long", day:"numeric", month:"long"});
    $("#date").textContent = s.charAt(0).toUpperCase()+s.slice(1);
  })();

  // Tema
  function applyTheme(t){
    document.documentElement.dataset.theme = t;
    $("#themeBtn").innerHTML = ICONS[t==="dark" ? "sun" : "moon"](19);
  }
  applyTheme(localStorage.getItem(THEMEKEY) || "light");
  applyStaticIcons();
  $("#themeBtn").onclick = () => {
    const t = document.documentElement.dataset.theme==="dark" ? "light":"dark";
    localStorage.setItem(THEMEKEY, t); applyTheme(t); syncServer();
  };

  function persistLocal(){
    pushGlobalsToActive();
    try{ localStorage.setItem(LKEY, JSON.stringify({lists, activeList})); }catch(e){}
  }
  function stateSnapshot(){
    pushGlobalsToActive();
    return { v:3, savedAt:new Date().toISOString(),
             lists, activeList, emailNotif,
             theme:document.documentElement.dataset.theme };
  }
  let syncTimer=null;
  function syncServer(){
    clearTimeout(syncTimer);
    syncTimer=setTimeout(()=>{
      window.api.save(stateSnapshot()).catch(()=>{});
    }, 450);
  }
  // save() y saveCats() persisten todo el estado (local + respaldo)
  function save(){ persistLocal(); syncServer(); }
  const saveCats = save;

  function render(){
    const toggleKey = lastToggleKey; lastToggleKey = null;
    renderCats();
    renderReminderBanner();
    updateFilterSummary();
    renderMiniCal();
    let visible = tasks.filter(t=>{
      const st = statusFilter==="all" ? true : statusFilter==="done" ? t.done : !t.done;
      const ct = catFilter==="all" ? true : t.cat===catFilter;
      let sq = true;
      if(searchQuery){
        sq = t.text.toLowerCase().includes(searchQuery)
          || (t.subtasks||[]).some(s=>s.text.toLowerCase().includes(searchQuery));
      }
      return st && ct && sq;
    });
    // Orden = (interruptores que sobreescriben) + (orden elegido como desempate).
    // El arrastre manual queda como desempate final gracias a que sort() es estable.
    const keys = sortKeys();
    if(keys.length) visible = visible.slice().sort((a,b)=>{
      for(const k of keys){ const r=k(a,b); if(r) return r; }
      return 0;
    });
    // Arrastrar siempre que el orden sea "Manual": si hay interruptores de
    // prioridad/vencimiento activos, igual se puede arrastrar y al soltar la
    // lista se reacomoda segun esos interruptores (el orden manual queda
    // como desempate dentro de cada nivel de prioridad/vencimiento).
    const reorderable = sortMode==="manual";

    list.innerHTML = "";
    if(!visible.length){
      let msg = "Agrega tu primera tarea arriba", emptyIcon = ICONS.notes(30);
      if(tasks.length){
        msg = catFilter!=="all"
          ? "Sin tareas en esta categoría"
          : (statusFilter==="done" ? "Aún no completas ninguna" : "¡Todo al día!");
        if(msg==="¡Todo al día!") emptyIcon = ICONS.checkCircle(30);
      }
      list.innerHTML = `<div class="empty"><span class="ico">${emptyIcon}</span>${msg}</div>`;
    } else {
      for(const t of visible){
        const li=document.createElement("li");
        if(t.done) li.classList.add("done");
        if(t.important) li.classList.add("important");
        li.dataset.id=t.id;
        const di=dueInfo(t);
        const subs=t.subtasks||[];
        const sdone=subs.filter(s=>s.done).length;
        const isOpen=expanded.has(t.id);
        const atts=t.attachments||[];
        const attOpen=attExpanded.has(t.id);
        const notesOpen=notesExpanded.has(t.id);
        const panelOpen=isOpen||attOpen||notesOpen;
        const chevHtml = animate => `<svg class="chev${animate?" anim":""}" viewBox="0 0 12 16" width="7" height="11"><polyline points="1.5,1.5 9.5,8 1.5,14.5" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        const subLabel = `${chevHtml(toggleKey==="sub:"+t.id)} Subtareas${subs.length?` ${sdone}/${subs.length}`:""}`;
        const subClass = (subs.length?"has-sub":"") + (subs.length && sdone===subs.length ? " complete":"") + (isOpen?" open":"");
        const attLabel = `${chevHtml(toggleKey==="att:"+t.id)} Archivos${atts.length?` (${atts.length})`:""}`;
        const attClass = (atts.length?"has-sub":"") + (attOpen?" open":"");
        const notesLabel = `${chevHtml(toggleKey==="notes:"+t.id)} Notas`;
        const notesClass = (t.notes?"has-sub":"") + (notesOpen?" open":"");
        let html=`<div class="row">
          <span class="grip" draggable="true" title="Arrastra para reordenar">${ICONS.grip(15)}</span>
          <div class="check" role="checkbox" aria-checked="${t.done}" tabindex="0" title="${t.done?"Marcar como pendiente":"Marcar como completada"}">
            <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>
          </div>
          <div class="body">
            <span class="txt">${escapeHtml(t.text)}</span>
            <div class="meta">
              <select class="catsel" title="Categoría">${catOptions(t.cat)}</select>
              <button class="due-btn ${di.cls}${t.due?" has-due":""}" title="${t.due?"Cambiar fecha (clic) · quitar (clic derecho)":"Poner fecha de vencimiento"}">${dueLabelHtml(di)}</button>
              <span class="hovwrap">
                <button class="subbtn ${subClass}" title="${subs.length?"Ver/ocultar subtareas":"Agregar subtareas"}">${subLabel}</button>
                <div class="hovlist">${subs.length
                  ? subs.map(s=>`<div class="hovrow ${s.done?"done":""}">${escapeHtml(s.text)}</div>`).join("")
                  : `<div class="hovempty">Sin subtareas</div>`}</div>
              </span>
              <span class="hovwrap">
                <button class="subbtn attbtn ${attClass}" title="Ver/agregar archivos adjuntos">${attLabel}</button>
                <div class="hovlist">${atts.length
                  ? atts.map(a=>`<div class="hovrow">${iconForName(a.name)} ${escapeHtml(a.name)}</div>`).join("")
                  : `<div class="hovempty">Sin archivos</div>`}</div>
              </span>
              <span class="hovwrap">
                <button class="subbtn notesbtn ${notesClass}" title="Ver/agregar notas">${notesLabel}</button>
                <div class="hovlist">${t.notes
                  ? `<div class="hovrow">${escapeHtml(t.notes)}</div>`
                  : `<div class="hovempty">Sin notas</div>`}</div>
              </span>
            </div>
          </div>
          <button class="star ${t.important?"on":""}" title="Marcar como importante">${t.important?ICONS.starFill(15):ICONS.star(15)}</button>
          <button class="edit" title="Editar">${ICONS.edit(15)}</button>
          <button class="del" title="Eliminar">${ICONS.close(15)}</button>
        </div>`;
        if(panelOpen){
          html+=`<div class="subpanel">`;
          if(isOpen){
            if(subs.length){
              const pct = Math.round(sdone/subs.length*100);
              html+=`<div class="subhead ${sdone===subs.length?"complete":""}">
                <div class="subbar"><span style="width:${pct}%"></span></div>
                <span class="subcount">${sdone}/${subs.length}</span>
              </div>`;
            }
            for(const s of subs){
              const sNotesOpen = subNotesExpanded.has(s.id);
              const sInherited = !s.due && !!t.due;
              const sEffDue = s.due || t.due || null;
              const sdi = dueInfo({due:sEffDue, done:s.done});
              const sDueTitle = sInherited
                ? "Hereda la fecha de la tarea (clic para poner una propia)"
                : (s.due ? "Cambiar fecha (clic) · quitar (clic derecho)" : "Poner fecha de vencimiento");
              html+=`<div class="subitem ${s.done?"done":""}" data-sid="${s.id}">
                <div class="subcheck"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>
                <span class="subtxt">${escapeHtml(s.text)}</span>
                <button class="due-btn subdue-btn ${sdi.cls}${sEffDue?" has-due":""}${sInherited?" inherited":""}" title="${sDueTitle}">${dueLabelHtml(sdi)}</button>
                <button class="subnotesbtn ${s.notes?"has-notes":""}${sNotesOpen?" open":""}" title="Ver/agregar notas de la subtarea">${ICONS.notes(13)}</button>
                <button class="subeditbtn" title="Editar subtarea">${ICONS.edit(13)}</button>
                <button class="subdel" title="Eliminar subtarea">${ICONS.close(13)}</button>
              </div>`;
              if(sNotesOpen){
                html+=`<div class="subnotes-row"><textarea class="subnotes" data-sid="${s.id}" maxlength="2000" placeholder="Notas de esta subtarea…">${escapeHtml(s.notes||"")}</textarea></div>`;
              }
            }
            html+=`<div class="subadd-row"><input class="subadd" type="text" maxlength="160" placeholder="Agregar subtarea y Enter…"></div>`;
          }
          if(attOpen){
            html+=`<div class="attsec">
              <div class="atthead">
                <span class="attlbl">${ICONS.paperclip(13)} Archivos${atts.length?` (${atts.length})`:""}</span>
                <button class="attadd">+ Adjuntar</button>
              </div>`;
            for(const a of atts){
              html+=`<div class="attitem" data-aid="${a.id}">
                <button class="attopen" title="Abrir">
                  <span class="atticon">${iconForName(a.name)}</span>
                  <span class="attname">${escapeHtml(a.name)}</span>
                  <span class="attsize">${formatSize(a.size)}</span>
                </button>
                <button class="attdel" title="Eliminar adjunto">${ICONS.close(13)}</button>
              </div>`;
            }
            html+=`</div>`;
          }
          if(notesOpen){
            html+=`<div class="notessec">
              <textarea class="notesarea" maxlength="4000" placeholder="Agregar notas a esta tarea…">${escapeHtml(t.notes||"")}</textarea>
            </div>`;
          }
          html+=`</div>`;
        }
        li.innerHTML=html;

        const grip=li.querySelector(".grip");
        if(reorderable){
          wireDrag(li, t.id);
        } else {
          grip.draggable=false; grip.classList.add("locked");
          grip.title="Para arrastrar: elegí el orden «Manual» (botón Ordenar)";
        }
        li.querySelector(".check").onclick = () => toggle(t.id);
        li.querySelector(".check").onkeydown = e => {if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle(t.id);}};
        li.querySelector(".txt").ondblclick = () => startEdit(t.id, li);
        const sel=li.querySelector(".catsel");
        styleCatSel(sel, t.cat);
        sel.onchange = () => { t.cat = sel.value || null; save(); render(); };
        const dueBtn=li.querySelector(".due-btn");
        dueBtn.onclick = e => {
          e.stopPropagation();
          openDatePicker(dueBtn, { value:t.due, max:null, onPick: v => {
            if(v){
              const conflicto = (t.subtasks||[]).find(s=>s.due && s.due>v);
              if(conflicto){
                alert(`No se puede poner esa fecha: la subtarea "${conflicto.text}" vence despues, el ${formatDMY(conflicto.due)}. Cambiá o quitá esa fecha primero.`);
                return;
              }
            }
            t.due = v; save(); render();
          }});
        };
        dueBtn.oncontextmenu = e => { e.preventDefault(); e.stopPropagation(); if(t.due){ t.due=null; save(); render(); } };
        const star=li.querySelector(".star");
        star.onclick = () => { t.important = !t.important; save(); render(); };
        li.oncontextmenu = e => openTaskMenu(e, t);
        const willOpen = !isOpen;
        li.querySelector(".subbtn").onclick = () => {
          if(willOpen) expanded.add(t.id); else expanded.delete(t.id);
          lastToggleKey = "sub:"+t.id;
          render();
          if(willOpen){ const el=list.querySelector(`li[data-id="${t.id}"] .subadd`); if(el) el.focus(); }
        };
        const attWillOpen = !attOpen;
        li.querySelector(".attbtn").onclick = () => {
          if(attWillOpen) attExpanded.add(t.id); else attExpanded.delete(t.id);
          lastToggleKey = "att:"+t.id;
          render();
        };
        const notesWillOpen = !notesOpen;
        li.querySelector(".notesbtn").onclick = () => {
          if(notesWillOpen) notesExpanded.add(t.id); else notesExpanded.delete(t.id);
          lastToggleKey = "notes:"+t.id;
          render();
          if(notesWillOpen){ const el=list.querySelector(`li[data-id="${t.id}"] .notesarea`); if(el) el.focus(); }
        };
        li.querySelector(".edit").onclick = () => startEdit(t.id, li);
        li.querySelector(".del").onclick = () => remove(t.id, li);

        if(notesOpen){
          const notesarea=li.querySelector(".notesarea");
          notesarea.oninput = () => { t.notes = notesarea.value; };
          notesarea.onblur = () => { t.notes = notesarea.value.trim() || null; save(); };
        }

        if(isOpen){
          li.querySelectorAll(".subitem").forEach(siEl=>{
            const sid=siEl.dataset.sid;
            siEl.querySelector(".subcheck").onclick = () => toggleSub(t, sid);
            siEl.querySelector(".subtxt").onclick = () => toggleSub(t, sid);
            siEl.querySelector(".subtxt").ondblclick = () => editSub(t, sid, siEl);
            siEl.querySelector(".subdel").onclick = () => removeSub(t, sid);
            siEl.querySelector(".subeditbtn").onclick = () => editSub(t, sid, siEl);
            siEl.querySelector(".subnotesbtn").onclick = () => {
              if(subNotesExpanded.has(sid)) subNotesExpanded.delete(sid); else subNotesExpanded.add(sid);
              render();
            };
            const sDueBtn=siEl.querySelector(".subdue-btn");
            sDueBtn.onclick = e => {
              e.stopPropagation();
              const s=(t.subtasks||[]).find(x=>x.id===sid); if(!s) return;
              openDatePicker(sDueBtn, { value:s.due, max:null, onPick: v => {
                if(v && t.due && v>t.due){
                  const ok=confirm(`Esta subtarea vencería el ${formatDMY(v)}, después que la tarea (vence el ${formatDMY(t.due)}). ¿Extender la fecha de la tarea al ${formatDMY(v)} también?`);
                  if(!ok) return;
                  t.due=v;
                }
                s.due=v; save(); render();
              }});
            };
            sDueBtn.oncontextmenu = e => {
              e.preventDefault(); e.stopPropagation();
              const s=(t.subtasks||[]).find(x=>x.id===sid); if(!s || !s.due) return;
              s.due=null; save(); render();
            };
          });
          li.querySelectorAll(".subnotes").forEach(taEl=>{
            const sid=taEl.dataset.sid;
            const s=(t.subtasks||[]).find(x=>x.id===sid); if(!s) return;
            taEl.oninput = () => { s.notes = taEl.value; };
            taEl.onblur = () => { s.notes = taEl.value.trim() || null; save(); };
          });
          const subadd=li.querySelector(".subadd");
          subadd.onkeydown = e => { if(e.key==="Enter"){ e.preventDefault(); addSub(t, subadd.value); } };
        }
        if(attOpen){
          li.querySelector(".attadd").onclick = () => { attTargetTaskId=t.id; $("#attInput").click(); };
          li.querySelectorAll(".attitem").forEach(aiEl=>{
            const aid=aiEl.dataset.aid;
            const a=(t.attachments||[]).find(x=>x.id===aid); if(!a) return;
            aiEl.querySelector(".attopen").onclick = () => openAttachment(a);
            aiEl.querySelector(".attdel").onclick = () => removeAttachment(t, aid);
          });
        }
        list.appendChild(li);
      }
    }
    updateStats();
  }

  // ----- Orden con prioridad/vencimiento que sobreescriben -----
  function todayStr(){
    const d=new Date(), p=n=>String(n).padStart(2,"0");
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  }
  function dueVal(t){ return t.due ? Date.parse(t.due) : Infinity; }
  function formatDMY(iso){
    const [y,m,d]=iso.split("-");
    return `${d}/${m}/${y.slice(2)}`;
  }
  function daysUntil(iso){
    const [y,m,d]=iso.split("-").map(Number);
    const due=Date.UTC(y,m-1,d);
    const n=new Date();
    const today=Date.UTC(n.getFullYear(),n.getMonth(),n.getDate());
    return Math.round((due-today)/86400000);
  }
  function dueInfo(t){
    if(!t.due) return {cls:"", label:ICONS.calendar(13), dateLabel:null, overdue:false};
    const today=todayStr();
    const dateLabel = t.due===today ? "Hoy" : formatDMY(t.due);
    if(t.done) return {cls:"due-done", label:dateLabel, dateLabel, overdue:false};
    const days=daysUntil(t.due);
    const overdue = days<0;
    const cls = overdue ? "due-overdue" : days<3 ? "due-red" : days<7 ? "due-orange" : days<14 ? "due-yellow" : "due-green";
    const label = overdue ? "Vencida" : dateLabel;
    return {cls, label, dateLabel, overdue};
  }
  function dueLabelHtml(di){
    if(!di.overdue) return di.label;
    return `<span class="due-label">Vencida</span><span class="due-real">${di.dateLabel}</span>`;
  }

  // ----- Mini calendario -----
  function renderMiniCal(){
    const grid=$("#mcGrid"); if(!grid) return;
    const y=calMonth.getFullYear(), m=calMonth.getMonth();
    const label=calMonth.toLocaleDateString("es-ES",{month:"long",year:"numeric"});
    $("#mcLabel").textContent = label.charAt(0).toUpperCase()+label.slice(1);

    // El calendario junta las tareas por vencer de TODAS las listas.
    pushGlobalsToActive();
    const dueMap=new Map();   // "YYYY-MM-DD" -> [{text, listName, foreign}, ...]
    for(const l of lists){
      for(const t of (l.tasks||[])){
        if(t.done || !t.due) continue;
        if(!dueMap.has(t.due)) dueMap.set(t.due, []);
        dueMap.get(t.due).push({text:t.text, listName:l.name, foreign:l.id!==activeList});
      }
    }

    const p=n=>String(n).padStart(2,"0");
    const firstDow=(new Date(y,m,1).getDay()+6)%7;   // lunes=0
    const daysInMonth=new Date(y,m+1,0).getDate();
    const todayKey=todayStr();
    const dowLabels=["L","M","X","J","V","S","D"];

    let html=dowLabels.map(l=>`<div class="mc-dow">${l}</div>`).join("");
    for(let i=0;i<firstDow;i++) html+=`<div class="mc-cell mc-empty"></div>`;
    for(let day=1; day<=daysInMonth; day++){
      const dateStr=`${y}-${p(m+1)}-${p(day)}`;
      const items=dueMap.get(dateStr)||[];
      const isToday=dateStr===todayKey;
      const dow=(firstDow+day-1)%7;
      if(items.length){
        const days=daysUntil(dateStr);
        const dotCls = days<0?"due-overdue":days<3?"due-red":days<7?"due-orange":days<14?"due-yellow":"due-green";
        const align = dow<=1 ? "mc-left" : dow>=5 ? "mc-right" : "";
        html+=`<div class="mc-cell hovwrap${isToday?" mc-today":""}">
          <span class="mc-num">${day}</span>
          <span class="mc-dot ${dotCls}"></span>
          <div class="hovlist ${align}">${items.map(it=>
            `<div class="hovrow">${escapeHtml(it.text)}${it.foreign?` <span class="mc-listtag">${escapeHtml(it.listName)}</span>`:""}</div>`).join("")}</div>
        </div>`;
      } else {
        html+=`<div class="mc-cell${isToday?" mc-today":""}"><span class="mc-num">${day}</span></div>`;
      }
    }
    grid.innerHTML=html;
  }

  $("#mcNext").onclick = () => { calMonth=new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 1); renderMiniCal(); };

  // ----- Selector de fecha propio (reemplaza el <input type=date> nativo,
  // que en Chrome/Edge deja que la rueda del mouse cambie la fecha sin querer) -----
  const datePop=$("#datePop"), dpGrid=$("#dpGrid"), dpLabel=$("#dpLabel");
  let dpMonth=new Date(), dpTarget=null;   // dpTarget = {value, max, onPick(v)}
  function renderDatePicker(){
    const y=dpMonth.getFullYear(), m=dpMonth.getMonth();
    const label=dpMonth.toLocaleDateString("es-ES",{month:"long",year:"numeric"});
    dpLabel.textContent = label.charAt(0).toUpperCase()+label.slice(1);
    const p=n=>String(n).padStart(2,"0");
    const firstDow=(new Date(y,m,1).getDay()+6)%7;
    const daysInMonth=new Date(y,m+1,0).getDate();
    const todayKey=todayStr();
    const dowLabels=["L","M","X","J","V","S","D"];
    let html=dowLabels.map(l=>`<div class="mc-dow">${l}</div>`).join("");
    for(let i=0;i<firstDow;i++) html+=`<div class="mc-cell mc-empty"></div>`;
    for(let day=1; day<=daysInMonth; day++){
      const dateStr=`${y}-${p(m+1)}-${p(day)}`;
      const isToday=dateStr===todayKey;
      const isSelected=dpTarget && dpTarget.value===dateStr;
      const isDisabled=dpTarget && dpTarget.max && dateStr>dpTarget.max;
      html+=`<div class="mc-cell${isToday?" mc-today":""}${isSelected?" mc-selected":""}${isDisabled?" mc-disabled":""}" data-date="${dateStr}">
        <span class="mc-num">${day}</span>
      </div>`;
    }
    dpGrid.innerHTML=html;
    dpGrid.querySelectorAll(".mc-cell:not(.mc-empty):not(.mc-disabled)").forEach(cell=>{
      cell.onclick = () => { const v=cell.dataset.date, cb=dpTarget&&dpTarget.onPick; closeDatePicker(); if(cb) cb(v); };
    });
  }
  function openDatePicker(anchorEl, opts){
    dpTarget = opts;
    dpMonth = opts.value ? new Date(opts.value+"T00:00:00") : new Date();
    renderDatePicker();
    datePop.hidden=false;
    const r=anchorEl.getBoundingClientRect();
    const mw=datePop.offsetWidth||240, mh=datePop.offsetHeight||270;
    let x=r.left, y=r.bottom+6;
    if(x+mw > window.innerWidth)  x = window.innerWidth  - mw - 8;
    if(y+mh > window.innerHeight) y = r.top - mh - 6;
    datePop.style.left = Math.max(8,x)+"px";
    datePop.style.top  = Math.max(8,y)+"px";
  }
  function closeDatePicker(){ datePop.hidden=true; dpTarget=null; }
  datePop.onclick = e => e.stopPropagation();
  document.addEventListener("click", closeDatePicker);
  $("#dpPrev").onclick = () => { dpMonth=new Date(dpMonth.getFullYear(), dpMonth.getMonth()-1, 1); renderDatePicker(); };
  $("#dpNext").onclick = () => { dpMonth=new Date(dpMonth.getFullYear(), dpMonth.getMonth()+1, 1); renderDatePicker(); };
  $("#dpToday").onclick = () => { const v=todayStr(), cb=dpTarget&&dpTarget.onPick; closeDatePicker(); if(cb) cb(v); };
  $("#dpClear").onclick = () => { const cb=dpTarget&&dpTarget.onPick; closeDatePicker(); if(cb) cb(null); };

  function sortKeys(){
    const ks=[];
    if(prioFirst) ks.push((a,b)=> (a.important?0:1) - (b.important?0:1));   // importantes arriba
    if(dueFirst)  ks.push((a,b)=> dueVal(a) - dueVal(b));                   // antes vence, antes va (vencidas primero)
    if(sortMode==="az") ks.push((a,b)=> a.text.localeCompare(b.text,"es",{sensitivity:"base",numeric:true}));
    else if(sortMode==="za") ks.push((a,b)=> b.text.localeCompare(a.text,"es",{sensitivity:"base",numeric:true}));
    else if(sortMode==="cat"){ const rank=id=>{const i=cats.findIndex(c=>c.id===id);return i<0?cats.length:i;}; ks.push((a,b)=> rank(a.cat)-rank(b.cat)); }
    else if(sortMode==="pending") ks.push((a,b)=> (a.done?1:0) - (b.done?1:0));
    else if(sortMode==="due") ks.push((a,b)=> dueVal(a) - dueVal(b));
    return ks;
  }

  // ----- Categorias -----
  function catOptions(sel){
    let o = `<option value="">Sin categoría</option>`;
    for(const c of cats)
      o += `<option value="${c.id}" ${c.id===sel?"selected":""}>${escapeHtml(c.name)}</option>`;
    return o;
  }
  function styleCatSel(sel, catId){
    const c = catById(catId);
    if(c){
      sel.classList.add("has-cat");
      sel.style.background = c.color+"26";
      sel.style.color = c.color;
    } else {
      sel.classList.remove("has-cat");
      sel.style.background = ""; sel.style.color = "";
    }
  }
  function renderCats(){
    catBar.innerHTML = "";
    catBar.appendChild(makeChip("Todas", null, catFilter==="all", () => { catFilter="all"; render(); }));
    for(const c of cats){
      if(editingCat===c.id){
        catBar.appendChild(makeCatEditor(c));
      } else {
        catBar.appendChild(makeChip(c.name, c, catFilter===c.id, () => {
          catFilter = catFilter===c.id ? "all" : c.id; render();
        }));
      }
    }
    if(addingCat){
      const inp=document.createElement("input");
      inp.className="newcat"; inp.placeholder="Nombre…"; inp.maxLength=24;
      catBar.appendChild(inp); inp.focus();
      let done=false;
      const fin=keep=>{
        if(done) return; done=true;
        addingCat=false;
        if(keep) createCat(inp.value);
        render();
      };
      inp.onkeydown=e=>{ if(e.key==="Enter"){e.preventDefault();fin(true);} else if(e.key==="Escape"){e.preventDefault();fin(false);} };
      inp.onblur=()=>fin(true);
    } else {
      const add=document.createElement("button");
      add.className="chip-add"; add.textContent="+ Nueva";
      add.onclick=()=>{ addingCat=true; render(); };
      catBar.appendChild(add);
    }
  }
  function makeChip(name, cat, active, onClick){
    const b=document.createElement("button");
    b.className="chip"+(active?" active":"");
    const color = cat ? cat.color : "var(--accent)";
    if(active) b.style.background = color;
    let html = "";
    if(cat) html += `<span class="dot" style="background:${active?'#fff':cat.color}"></span>`;
    html += `<span class="chip-name">${escapeHtml(name)}</span>`;
    if(cat && active) html += `<span class="chip-edit" title="Editar categoría">${ICONS.edit(13)}</span><span class="x" title="Eliminar categoría">${ICONS.close(13)}</span>`;
    b.innerHTML = html;
    b.onclick = e => {
      if(e.target.classList.contains("x")){ e.stopPropagation(); deleteCat(cat); return; }
      if(e.target.classList.contains("chip-edit")){ e.stopPropagation(); editingCat=cat.id; render(); return; }
      onClick();
    };
    return b;
  }
  function makeCatEditor(c){
    const wrap=document.createElement("div");
    wrap.className="catedit";
    const inp=document.createElement("input");
    inp.className="newcat"; inp.maxLength=24; inp.value=c.name;
    wrap.appendChild(inp);
    const swatches=document.createElement("div");
    swatches.className="catedit-swatches";
    PALETTE.forEach(color=>{
      const sw=document.createElement("button");
      sw.type="button";
      sw.className="catedit-swatch"+(c.color===color?" active":"");
      sw.style.background=color;
      sw.title=color;
      sw.onclick=e=>{
        e.stopPropagation();
        c.color=color;
        swatches.querySelectorAll(".catedit-swatch").forEach(x=>x.classList.remove("active"));
        sw.classList.add("active");
        saveCats();
      };
      swatches.appendChild(sw);
    });
    wrap.appendChild(swatches);
    let done=false;
    const fin=keep=>{
      if(done) return; done=true;
      editingCat=null;
      if(keep){ const v=inp.value.trim(); if(v) c.name=v; }
      saveCats(); render();
    };
    inp.onkeydown=e=>{ if(e.key==="Enter"){e.preventDefault();fin(true);} else if(e.key==="Escape"){e.preventDefault();fin(false);} };
    inp.onblur=()=>fin(true);
    setTimeout(()=>{ inp.focus(); inp.select(); });
    return wrap;
  }
  function createCat(name){
    name = (name||"").trim(); if(!name) return;
    const color = PALETTE[cats.length % PALETTE.length];
    const cat = {id:"c"+Date.now().toString(36), name, color};
    cats.push(cat); saveCats();
    catFilter = cat.id;
  }
  function deleteCat(cat){
    if(!cat) return;
    if(!confirm(`¿Eliminar la categoría "${cat.name}"? Sus tareas quedarán sin categoría.`)) return;
    tasks.forEach(t=>{ if(t.cat===cat.id) t.cat=null; });
    cats = cats.filter(c=>c.id!==cat.id);
    if(catFilter===cat.id) catFilter="all";
    saveCats(); save(); render();
  }

  function updateStats(){
    const total=tasks.length, done=tasks.filter(t=>t.done).length;
    const pending=total-done;
    const pct = total ? Math.round(done/total*100) : 0;
    $("#bar").style.width = pct+"%";
    $("#progressPct").textContent = pct+"%";
    $("#progressLabel").textContent = total
      ? `${done} de ${total} completadas` : "Sin tareas todavía";
    $("#count").textContent = pending===1 ? "1 pendiente" : `${pending} pendientes`;
  }

  function add(text){
    text=text.trim(); if(!text) return;
    const cat = catFilter!=="all" ? catFilter : null;
    tasks.unshift({id:Date.now()+""+Math.random().toString(36).slice(2,6), text, done:false, cat, important:false, due:null});
    save(); render();
  }
  function toggle(id){
    const t=tasks.find(x=>x.id===id); if(!t) return;
    t.done=!t.done;
    if(t.subtasks && t.subtasks.length){
      if(t.done){
        // Marcar el padre: recordar el estado actual y completar todas.
        const mem={};
        t.subtasks.forEach(s=>{ mem[s.id]=s.done; s.done=true; });
        t.subMemory=mem;
      } else {
        // Desmarcar el padre: restaurar lo que había (no borra lo ya marcado).
        const mem=t.subMemory;
        t.subtasks.forEach(s=>{ s.done = (mem && (s.id in mem)) ? mem[s.id] : false; });
        delete t.subMemory;
      }
    }
    save(); render();
  }
  // El padre refleja sus subtareas: se completa solo cuando todas están hechas.
  function syncParentFromSubs(t){
    if(t.subtasks && t.subtasks.length) t.done = t.subtasks.every(s=>s.done);
  }
  function remove(id, li){
    li.classList.add("removing");
    setTimeout(()=>{
      const idx=tasks.findIndex(x=>x.id===id); if(idx<0) return;
      const [task]=tasks.splice(idx,1);
      save(); render();
      showUndo(task, idx);
    }, 230);
  }

  // ----- Deshacer eliminar -----
  let pendingUndo=null;   // {task, index, timer}
  const undoToast=$("#undoToast"), undoMsg=$("#undoMsg"), undoBtn=$("#undoBtn");
  function showUndo(task, index){
    if(pendingUndo) clearTimeout(pendingUndo.timer);
    const label=task.text.length>34 ? task.text.slice(0,34)+"…" : task.text;
    undoMsg.textContent=`"${label}" eliminada`;
    undoToast.hidden=false;
    const timer=setTimeout(()=>{ pendingUndo=null; undoToast.hidden=true; }, 6000);
    pendingUndo={task, index, timer};
  }
  undoBtn.onclick = () => {
    if(!pendingUndo) return;
    clearTimeout(pendingUndo.timer);
    const {task, index}=pendingUndo;
    tasks.splice(Math.min(index, tasks.length), 0, task);
    pendingUndo=null; undoToast.hidden=true;
    save(); render();
  };

  let dragId=null;
  function clearDropMarks(){
    list.querySelectorAll("li").forEach(x=>x.classList.remove("drop-before","drop-after"));
  }
  function wireDrag(li, id){
    const grip=li.querySelector(".grip");
    grip.ondragstart=e=>{
      dragId=id; li.classList.add("dragging");
      e.dataTransfer.effectAllowed="move";
      e.dataTransfer.setData("text/plain", id);
    };
    grip.ondragend=()=>{ dragId=null; li.classList.remove("dragging"); clearDropMarks(); };
    li.ondragover=e=>{
      if(dragId===null || dragId===id) return;
      e.preventDefault(); e.dataTransfer.dropEffect="move";
      const r=li.getBoundingClientRect();
      const after = e.clientY > r.top + r.height/2;
      li.classList.toggle("drop-after", after);
      li.classList.toggle("drop-before", !after);
    };
    li.ondragleave=()=>li.classList.remove("drop-before","drop-after");
    li.ondrop=e=>{
      if(dragId===null || dragId===id) return;
      e.preventDefault();
      const after=li.classList.contains("drop-after");
      reorder(dragId, id, after);
    };
  }
  function reorder(fromId, toId, after){
    const from=tasks.findIndex(x=>x.id===fromId);
    if(from<0) return;
    const item=tasks.splice(from,1)[0];
    let to=tasks.findIndex(x=>x.id===toId);
    if(after) to++;
    tasks.splice(to,0,item);
    save(); render();
  }

  // ----- Subtareas -----
  function addSub(t, text){
    text=text.trim(); if(!text) return;
    if(!t.subtasks) t.subtasks=[];
    t.subtasks.push({id:"s"+Date.now().toString(36)+Math.random().toString(36).slice(2,5), text, done:false});
    expanded.add(t.id);
    delete t.subMemory;
    syncParentFromSubs(t);   // una subtarea nueva sin hacer reabre el padre
    save(); render();
    const el=list.querySelector(`li[data-id="${t.id}"] .subadd`); if(el) el.focus();
  }
  function toggleSub(t, sid){
    const s=(t.subtasks||[]).find(x=>x.id===sid); if(!s) return;
    s.done=!s.done;
    delete t.subMemory;   // cambio manual: la memoria del padre ya no aplica
    syncParentFromSubs(t);
    save(); render();
  }
  function removeSub(t, sid){
    t.subtasks=(t.subtasks||[]).filter(x=>x.id!==sid);
    delete t.subMemory;
    syncParentFromSubs(t);
    save(); render();
  }
  function editSub(t, sid, siEl){
    const s=(t.subtasks||[]).find(x=>x.id===sid); if(!s) return;
    const span=siEl.querySelector(".subtxt");
    const inp=document.createElement("input");
    inp.type="text"; inp.className="subedit"; inp.value=s.text; inp.maxLength=160;
    span.replaceWith(inp); inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
    let closed=false;
    const fin=keep=>{
      if(closed) return; closed=true;
      if(keep){ const v=inp.value.trim(); if(v){ s.text=v; save(); } }
      render();
    };
    inp.onkeydown=e=>{ if(e.key==="Enter"){e.preventDefault();fin(true);} else if(e.key==="Escape"){e.preventDefault();fin(false);} };
    inp.onblur=()=>fin(true);
  }

  // ----- Adjuntos -----
  function extOf(name){ const m=/\.([a-z0-9]+)$/i.exec(name||""); return m?m[1].toLowerCase():""; }
  function iconForName(name){
    const e=extOf(name);
    if(["png","jpg","jpeg","gif","webp"].includes(e)) return ICONS.image(15);
    return ICONS.file(15);
  }
  function formatSize(bytes){
    if(!bytes) return "";
    if(bytes<1024) return bytes+" B";
    if(bytes<1024*1024) return Math.round(bytes/1024)+" KB";
    return (bytes/(1024*1024)).toFixed(1)+" MB";
  }
  async function uploadAttachments(t, files){
    if(!sbUser || !files || !files.length) return;
    const btn=list.querySelector(`li[data-id="${t.id}"] .attadd`);
    const rejected=[];
    if(btn){ btn.disabled=true; btn.textContent="Subiendo…"; }
    try{
      for(const file of files){
        const ext=extOf(file.name);
        if(!ATT_ALLOWED_EXT.includes(ext)){ rejected.push(file.name); continue; }
        const id="a"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
        const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
        const path=`${sbUser.id}/${t.id}/${id}-${safeName}`;
        const { error } = await sb.storage.from(ATT_BUCKET).upload(path, file);
        if(error){ rejected.push(file.name); continue; }
        if(!t.attachments) t.attachments=[];
        t.attachments.push({ id, name:file.name, path, size:file.size, type:file.type });
      }
    } finally {
      save(); render();
      if(rejected.length) alert("No se pudieron adjuntar: " + rejected.join(", "));
    }
  }
  async function openAttachment(a){
    try{
      const { data, error } = await sb.storage.from(ATT_BUCKET).createSignedUrl(a.path, 60);
      if(error || !data) { alert("No se pudo abrir el archivo."); return; }
      window.open(data.signedUrl, "_blank");
    }catch(e){ alert("No se pudo abrir el archivo."); }
  }
  async function removeAttachment(t, aid){
    const a=(t.attachments||[]).find(x=>x.id===aid); if(!a) return;
    if(!confirm(`¿Eliminar "${a.name}"?`)) return;
    try{ await sb.storage.from(ATT_BUCKET).remove([a.path]); }catch(e){}
    t.attachments=(t.attachments||[]).filter(x=>x.id!==aid);
    save(); render();
  }

  function startEdit(id, li){
    const t=tasks.find(x=>x.id===id); if(!t) return;
    const span=li.querySelector(".txt");
    const inp=document.createElement("input");
    inp.type="text"; inp.className="edit-input"; inp.value=t.text; inp.maxLength=200;
    span.replaceWith(inp);
    inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
    let closed=false;
    const finish=keep=>{
      if(closed) return; closed=true;
      if(keep){ const v=inp.value.trim(); if(v){ t.text=v; save(); } }
      render();
    };
    inp.onkeydown=e=>{
      if(e.key==="Enter"){ e.preventDefault(); finish(true); }
      else if(e.key==="Escape"){ e.preventDefault(); finish(false); }
    };
    inp.onblur=()=>finish(true);
  }

  $("#form").onsubmit = e => { e.preventDefault(); add(input.value); input.value=""; input.focus(); };

  document.querySelectorAll(".filters button").forEach(b=>{
    b.onclick=()=>{
      document.querySelector(".filters .active").classList.remove("active");
      b.classList.add("active"); statusFilter=b.dataset.filter; render();
    };
  });

  function refreshSortBtns(){
    document.querySelectorAll(".sort-opt").forEach(b=> b.classList.toggle("active", b.dataset.sort===sortMode));
  }
  refreshSortBtns();
  document.querySelectorAll(".sort-opt").forEach(b=>{
    b.onclick = () => {
      sortMode = b.dataset.sort;
      save();
      refreshSortBtns();
      render();
    };
  });

  const tPrio=$("#tPrio"), tDue=$("#tDue");
  function refreshToggles(){ tPrio.classList.toggle("on",prioFirst); tDue.classList.toggle("on",dueFirst); }
  tPrio.onclick = () => { prioFirst=!prioFirst; persistLocal(); syncServer(); refreshToggles(); render(); };
  tDue.onclick  = () => { dueFirst=!dueFirst;  persistLocal(); syncServer(); refreshToggles(); render(); };
  refreshToggles();

  $("#clearDone").onclick = () => {
    if(!tasks.some(t=>t.done)) return;
    tasks=tasks.filter(t=>!t.done); save(); render();
  };

  // ----- Botones Mostrar/Categoría/Ordenar (menús desplegables, posición fija
  // para no recortarse: viven dentro de la barra lateral con scroll propio) -----
  const showBtn=$("#showBtn"), showPop=$("#showPop");
  const catBtn=$("#catBtn"), catPop=$("#catPop");
  const sortBtn=$("#sortBtn"), sortPop=$("#sortPop");
  const sbPops=[showPop, catPop, sortPop];
  function wirePopBtn(btn, pop){
    btn.onclick = e => {
      e.stopPropagation();
      const show = pop.hidden;
      sbPops.forEach(p=>{ if(p!==pop) p.hidden=true; });
      if(show){
        const r=btn.getBoundingClientRect();
        const mw=pop.offsetWidth||260, mh=pop.offsetHeight||260;
        let x=r.left, y=r.bottom+6;
        if(x+mw > window.innerWidth)  x = window.innerWidth  - mw - 8;
        if(y+mh > window.innerHeight) y = window.innerHeight - mh - 8;
        pop.style.left = Math.max(8,x)+"px";
        pop.style.top  = Math.max(8,y)+"px";
      }
      pop.hidden = !show;
    };
    pop.onclick = e => e.stopPropagation();
  }
  wirePopBtn(showBtn, showPop);
  wirePopBtn(catBtn, catPop);
  wirePopBtn(sortBtn, sortPop);
  document.addEventListener("click", () => { sbPops.forEach(p=>p.hidden=true); });
  function updateFilterSummary(){
    showBtn.classList.toggle("active", statusFilter!=="all");
    catBtn.classList.toggle("active", catFilter!=="all");
    sortBtn.classList.toggle("active", sortMode!=="manual");
  }

  // ----- Selector de listas (el título es el botón) -----
  const listSelBtn=$("#listSelBtn"), listPop=$("#listPop");
  let renamingList=null;
  function updateListTitle(){
    const l=activeListObj();
    $("#listTitle").textContent = l ? l.name : "Mis Tareas";
  }
  function resetViewForList(){
    catFilter="all"; searchQuery="";
    const si=$("#searchInput"); if(si){ si.value=""; $("#searchClear").hidden=true; }
    if(typeof pendingUndo!=="undefined" && pendingUndo){ clearTimeout(pendingUndo.timer); pendingUndo=null; $("#undoToast").hidden=true; }
  }
  function switchList(id){
    if(id===activeList){ listPop.hidden=true; return; }
    pushGlobalsToActive();
    activeList=id;
    pullGlobalsFromActive();
    resetViewForList();
    refreshSortBtns(); refreshToggles();
    persistLocal(); syncServer();
    updateListTitle(); render();
  }
  function createList(){
    pushGlobalsToActive();
    const l={id:newListId(), name:"Nueva lista", tasks:[], cats:[], sort:"manual", prioFirst:false, dueFirst:false};
    lists.push(l); activeList=l.id;
    pullGlobalsFromActive();
    resetViewForList();
    refreshSortBtns(); refreshToggles();
    persistLocal(); syncServer();
    updateListTitle(); render();
    renamingList=l.id; renderListMenu();   // abrir el nombre para editar
  }
  function deleteList(id){
    if(lists.length<=1){ alert("No se puede eliminar la única lista."); return; }
    const l=lists.find(x=>x.id===id); if(!l) return;
    const n=(l.tasks||[]).length;
    if(!confirm(`¿Eliminar la lista "${l.name}"${n?` y sus ${n} tarea(s)`:""}? No se puede deshacer.`)) return;
    const wasActive = activeList===id;
    lists=lists.filter(x=>x.id!==id);
    if(wasActive){ activeList=lists[0].id; pullGlobalsFromActive(); resetViewForList(); refreshSortBtns(); refreshToggles(); updateListTitle(); }
    persistLocal(); syncServer(); render(); renderListMenu();
  }
  function renderListMenu(){
    listPop.innerHTML="";
    for(const l of lists){
      if(renamingList===l.id){
        const inp=document.createElement("input");
        inp.className="ls-rename"; inp.value=l.name; inp.maxLength=30;
        listPop.appendChild(inp);
        setTimeout(()=>{ inp.focus(); inp.select(); });
        let done=false;
        const fin=keep=>{ if(done) return; done=true; renamingList=null;
          if(keep){ const v=inp.value.trim(); if(v) l.name=v; }
          persistLocal(); syncServer(); updateListTitle(); renderListMenu(); };
        inp.onkeydown=e=>{ if(e.key==="Enter"){e.preventDefault();fin(true);} else if(e.key==="Escape"){e.preventDefault();fin(false);} };
        inp.onblur=()=>fin(true);
        continue;
      }
      const row=document.createElement("div");
      row.className="ls-row"+(l.id===activeList?" active":"");
      const nameBtn=document.createElement("button");
      nameBtn.className="ls-name";
      nameBtn.innerHTML=`<span class="ls-check">${l.id===activeList?ICONS.check(13):""}</span><span>${escapeHtml(l.name)}</span>`;
      nameBtn.onclick=()=>{ switchList(l.id); listPop.hidden=true; };
      row.appendChild(nameBtn);
      const ed=document.createElement("button");
      ed.className="ls-edit"; ed.title="Renombrar"; ed.innerHTML=ICONS.edit(13);
      ed.onclick=e=>{ e.stopPropagation(); renamingList=l.id; renderListMenu(); };
      row.appendChild(ed);
      if(lists.length>1){
        const del=document.createElement("button");
        del.className="ls-del"; del.title="Eliminar lista"; del.innerHTML=ICONS.close(13);
        del.onclick=e=>{ e.stopPropagation(); deleteList(l.id); };
        row.appendChild(del);
      }
      listPop.appendChild(row);
    }
    const add=document.createElement("button");
    add.className="ls-add"; add.textContent="+ Nueva lista";
    add.onclick=()=> createList();
    listPop.appendChild(add);
  }
  listSelBtn.onclick=e=>{
    e.stopPropagation();
    const show=listPop.hidden;
    if(show){ renamingList=null; renderListMenu(); }
    listPop.hidden=!show;
  };
  listPop.onclick=e=>e.stopPropagation();
  document.addEventListener("click", ()=>{ listPop.hidden=true; });

  // ----- Menú contextual (clic derecho) de cada tarea -----
  const ctxMenu=$("#taskCtxMenu"), ctxAddSub=$("#ctxAddSub"), ctxAddAtt=$("#ctxAddAtt"), ctxAddNotes=$("#ctxAddNotes");
  let ctxTask=null;
  function openTaskMenu(e, t){
    e.preventDefault();
    e.stopPropagation();
    ctxTask = t;
    ctxMenu.hidden = false;
    const mw=ctxMenu.offsetWidth||190, mh=ctxMenu.offsetHeight||120;
    let x=e.clientX, y=e.clientY;
    if(x+mw > window.innerWidth)  x = window.innerWidth  - mw - 8;
    if(y+mh > window.innerHeight) y = window.innerHeight - mh - 8;
    ctxMenu.style.left = Math.max(8,x)+"px";
    ctxMenu.style.top  = Math.max(8,y)+"px";
  }
  function closeTaskMenu(){ ctxMenu.hidden = true; ctxTask = null; }
  ctxMenu.onclick = e => e.stopPropagation();
  document.addEventListener("click", closeTaskMenu);
  document.addEventListener("contextmenu", e => { if(!ctxMenu.contains(e.target)) closeTaskMenu(); });
  document.addEventListener("scroll", closeTaskMenu, true);
  ctxAddSub.onclick = () => {
    if(!ctxTask) return;
    expanded.add(ctxTask.id);
    lastToggleKey = "sub:"+ctxTask.id;
    render();
    const el=list.querySelector(`li[data-id="${ctxTask.id}"] .subadd`); if(el) el.focus();
    closeTaskMenu();
  };
  ctxAddAtt.onclick = () => {
    if(!ctxTask) return;
    attExpanded.add(ctxTask.id);
    lastToggleKey = "att:"+ctxTask.id;
    attTargetTaskId = ctxTask.id;
    render();
    $("#attInput").click();
    closeTaskMenu();
  };
  ctxAddNotes.onclick = () => {
    if(!ctxTask) return;
    notesExpanded.add(ctxTask.id);
    lastToggleKey = "notes:"+ctxTask.id;
    render();
    const el=list.querySelector(`li[data-id="${ctxTask.id}"] .notesarea`); if(el) el.focus();
    closeTaskMenu();
  };

  // ----- Buscador (siempre visible en la barra lateral) -----
  const searchInput=$("#searchInput"), searchClear=$("#searchClear");
  searchInput.oninput = () => {
    searchQuery = searchInput.value.trim().toLowerCase();
    searchClear.hidden = !searchInput.value;
    render();
  };
  searchClear.onclick = () => { searchInput.value=""; searchQuery=""; searchClear.hidden=true; render(); searchInput.focus(); };
  searchInput.onkeydown = (e) => { if(e.key==="Escape"){ searchClear.onclick(); } };

  // ----- Recordatorios de vencimiento (de TODAS las listas) -----
  function dueItemsAllLists(){
    pushGlobalsToActive();
    const today=todayStr();
    const overdue=[], dueToday=[];
    for(const l of lists){
      for(const t of (l.tasks||[])){
        if(t.done || !t.due) continue;
        const item={text:t.text, due:t.due, listId:l.id, listName:l.name};
        if(t.due<today) overdue.push(item);
        else if(t.due===today) dueToday.push(item);
      }
    }
    return {overdue, dueToday};
  }
  function renderReminderBanner(){
    const b=$("#reminderBanner");
    const {overdue, dueToday}=dueItemsAllLists();
    if(reminderDismissed || (overdue.length===0 && dueToday.length===0)){ b.hidden=true; return; }
    const rowsHtml = items => {
      const groups=new Map();   // listId -> {name, items:[]}
      for(const it of items){
        if(!groups.has(it.listId)) groups.set(it.listId, {name:it.listName, items:[]});
        groups.get(it.listId).items.push(it);
      }
      let html="";
      for(const [listId, g] of groups){
        html += `<div class="hov-listhdr">${escapeHtml(g.name)}</div>`;
        html += g.items.map(it=>`<div class="hovrow rb-hoverow" data-list="${listId}">${escapeHtml(it.text)} <span class="mc-listtag">${formatDMY(it.due)}</span></div>`).join("");
      }
      return html;
    };
    const parts=[];
    if(overdue.length) parts.push(`<span class="hovwrap"><span class="rb-overdue">${overdue.length} vencida${overdue.length>1?'s':''}</span><div class="hovlist">${rowsHtml(overdue)}</div></span>`);
    if(dueToday.length) parts.push(`<span class="hovwrap">${dueToday.length} para hoy<div class="hovlist">${rowsHtml(dueToday)}</div></span>`);
    b.innerHTML = `<span class="rb-ico">${ICONS.bell(16)}</span><span class="rb-text">Tenés ${parts.join(" y ")}.</span>`
      + `<button class="rb-close" title="Ocultar">${ICONS.close(14)}</button>`;
    b.hidden=false;
    b.querySelectorAll(".rb-hoverow").forEach(row=>{
      row.onclick = () => {
        const id=row.dataset.list;
        if(id!==activeList){
          pushGlobalsToActive(); activeList=id; pullGlobalsFromActive(); resetViewForList(); updateListTitle();
        }
        dueFirst=true; statusFilter="all";
        refreshSortBtns(); refreshToggles();
        persistLocal(); syncServer(); render();
      };
    });
    b.querySelector(".rb-close").onclick = () => { reminderDismissed=true; b.hidden=true; };
  }
  // Resumen diario por email: el botón solo guarda la preferencia (emailNotif),
  // que se sincroniza a la cuenta del usuario. El envío lo hace una función del
  // servidor (Supabase) una vez por día; acá no se manda nada.
  const notifBtn=$("#notifBtn");
  function refreshNotifBtn(){ notifBtn.classList.toggle("on", emailNotif); }
  notifBtn.title = "Resumen diario de vencimientos por email";
  refreshNotifBtn();
  notifBtn.onclick = () => {
    emailNotif = !emailNotif;
    localStorage.setItem("mis_tareas_emailNotif", emailNotif?"1":"0");
    refreshNotifBtn();
    save();
    alert(emailNotif
      ? "Listo. Vas a recibir un resumen diario por email (a la dirección de tu cuenta) cuando tengas tareas vencidas o que venzan ese día."
      : "Aviso por email desactivado.");
  };

  // ----- PWA: service worker (instalable + abre offline) -----
  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=> navigator.serviceWorker.register("/sw.js").catch(()=>{}));
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  $("#attInput").onchange = ev => {
    const files=[...ev.target.files]; ev.target.value="";
    const t=tasks.find(x=>x.id===attTargetTaskId); attTargetTaskId=null;
    if(t && files.length) uploadAttachments(t, files);
  };

  // ----- Arranque: cargar el estado desde el archivo (vía Electron) -----
  async function boot(){
    try{
      const d = await window.api.load();
      let loaded=null, loadedActive=null;
      if(d && Array.isArray(d.lists) && d.lists.length){          // formato v3
        loaded=d.lists; loadedActive=d.activeList;
      } else if(d && Array.isArray(d.tasks)){                     // formato viejo v2 -> migrar
        loaded=migrateFlat(d); loadedActive=loaded[0].id;
      }
      const hasContent = loaded && loaded.some(l => (l.tasks&&l.tasks.length) || (l.cats&&l.cats.length));
      if(hasContent){
        lists=loaded; activeList=loadedActive || lists[0].id;
        if(!activeListObj()) activeList=lists[0].id;
        pullGlobalsFromActive();
        if(typeof d.emailNotif==="boolean"){ emailNotif=d.emailNotif; localStorage.setItem("mis_tareas_emailNotif", emailNotif?"1":"0"); }
        if(d.theme){ localStorage.setItem(THEMEKEY, d.theme); applyTheme(d.theme); }
        refreshSortBtns(); refreshToggles(); refreshNotifBtn();
        persistLocal();
      } else {
        // Supabase vacío: subimos lo que haya en localStorage
        syncServer();
      }
    }catch(e){}
    updateListTitle();
    render();
    input.focus();
  }
  boot();
</script>
</body>
</html>
